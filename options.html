<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Настройки Sensitive Scanner</title>
</head>
<body>
  <h2>Настройки сканера</h2>
  <label>Таймаут запроса (сек): <input type="number" id="timeout" min="1" max="30" value="10"></label><br><br>
  <label>Одновременных запросов: <input type="number" id="batchSize" min="1" max="20" value="10"></label><br><br>
  <label>Задержка между пакетами (мс): <input type="number" id="rateLimit" min="0" max="5000" value="0"></label><br><br>
  <fieldset>
    <legend>Категории путей</legend>
    <label><input type="checkbox" class="category" data-cat="git" checked> Git</label><br>
    <label><input type="checkbox" class="category" data-cat="docker" checked> Docker</label><br>
    <label><input type="checkbox" class="category" data-cat="cicd" checked> CI/CD</label><br>
    <label><input type="checkbox" class="category" data-cat="cloud" checked> Cloud</label><br>
    <label><input type="checkbox" class="category" data-cat="cms" checked> CMS</label><br>
    <label><input type="checkbox" class="category" data-cat="backup" checked> Backups</label><br>
    <label><input type="checkbox" class="category" data-cat="logs" checked> Logs</label><br>
    <label><input type="checkbox" class="category" data-cat="ide" checked> IDE</label>
  </fieldset>
  <br>
  <button id="saveBtn">Сохранить</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
