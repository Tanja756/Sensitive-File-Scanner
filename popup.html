<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --border: #eee;
      --table-header: #f0f0f0;
      --muted: #888;
    }
    body.dark {
      --bg: #1e1e1e;
      --text: #e0e0e0;
      --border: #444;
      --table-header: #2a2a2a;
      --muted: #aaa;
    }
    body {
      width: 560px;
      font-family: sans-serif;
      padding: 12px;
      background-color: var(--bg);
      color: var(--text);
    }
    button {
      padding: 6px 10px;
      margin: 4px 4px 4px 0;
      cursor: pointer;
    }
    .hidden { display: none; }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header-row h3 { margin: 0; }
    #progressContainer { margin: 10px 0; }
    #progressBar { width: 100%; height: 20px; }
    #progressText { font-size: 12px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background-color: var(--table-header); }
    td, th { padding: 4px 8px; border-bottom: 1px solid var(--border); text-align: left; font-size: 12px; }
    .status-200 { color: green; font-weight: bold; }
    .status-301, .status-302 { color: orange; }
    .status-401, .status-403 { color: darkorange; font-weight: bold; }
    .status-500 { color: red; font-weight: bold; }
    .status-error { color: gray; }
    .sev-critical { color: #c0392b; font-weight: bold; }
    .sev-high { color: #e67e22; font-weight: bold; }
    .sev-medium { color: #f39c12; }
    .sev-low { color: #7f8c8d; }
    #lastScanInfo { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .scan-btn {
      cursor: pointer;
      background: none;
      border: none;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0.7;
    }
    .scan-btn:hover { opacity: 1; }
    .filter-btn { padding: 2px 8px; margin-right: 4px; font-size: 11px; }
    .filter-btn.active { background: #aaa; color: white; }
    body.dark .filter-btn.active { background: #555; }
    #debugBanner {
      background: #ffe0e0;
      border: 2px solid red;
      padding: 6px;
      margin-bottom: 8px;
      font-weight: bold;
      color: #b00;
    }
    body.dark #debugBanner { background: #4a2020; color: #faa; }
    #detectionPanel {
      margin: 8px 0;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
    }
    #detectionPanel ul { margin: 4px 0; padding-left: 18px; }
    #detectionPanel .vuln-item { margin: 2px 0; }
    #historyPanel { margin: 8px 0; font-size: 12px; }
    #historySelect { max-width: 340px; font-size: 12px; }
    #themeToggle, .icon-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
    }
    .toolbar { margin-bottom: 6px; }
    .options-link { font-size: 12px; text-decoration: none; color: inherit; }
    #stopBtn { color: #c0392b; }
  </style>
</head>
<body>
  <div class="header-row">
    <h3>🔍 Sensitive Scanner</h3>
    <div>
      <a href="#" id="optionsLink" class="options-link" title="Настройки">⚙️ Настройки</a>
      <button id="themeToggle" class="icon-btn" title="Переключить тему">🌙</button>
    </div>
  </div>
  <div id="debugBanner" class="hidden">⚠️ Обнаружен режим DEBUG = True! Сервер может раскрывать конфиденциальные данные.</div>
  <div class="toolbar">
    <button id="scanSiteBtn">Проверить сайт</button>
    <button id="scanPathBtn">Проверить текущий путь</button>
    <button id="scanWPBtn" style="background:#21759b;color:white;border-color:#21759b;">WordPress Scan</button>
    <button id="scanPmaBtn" style="background:#f7930c;color:white;border-color:#f7930c;">phpMyAdmin Scan</button>
    <button id="pauseBtn" class="hidden">⏸ Пауза</button>
    <button id="stopBtn" class="hidden">⏹ Стоп</button>
  </div>
  <div id="status">Ожидание...</div>
  <div id="lastScanInfo" class="hidden"></div>
  <div id="historyPanel">
    <label>История: </label>
    <select id="historySelect"><option value="">— выберите скан —</option></select>
    <button id="clearHistoryBtn" title="Очистить историю" style="font-size:11px;">🗑</button>
  </div>
  <div id="progressContainer" class="hidden">
    <progress id="progressBar" value="0" max="100"></progress>
    <div id="progressText">0 / 0</div>
  </div>
  <div id="detectionPanel" class="hidden"></div>
  <div id="filtersContainer" class="hidden" style="margin: 8px 0;">
    <strong>Фильтр:</strong>
    <button class="filter-btn" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="200">200</button>
    <button class="filter-btn" data-filter="3xx">3xx</button>
    <button class="filter-btn" data-filter="401,403">401/403</button>
    <button class="filter-btn" data-filter="500">500+</button>
    <button class="filter-btn" data-filter="network_error">Ошибки сети</button>
  </div>
  <div id="securityHeaders" class="hidden" style="margin-top:10px;"></div>
  <table id="resultsTable" class="hidden">
    <thead>
      <tr><th>Уровень</th><th>Путь</th><th>Статус</th><th>Размер</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="exportContainer" class="hidden" style="margin-top: 10px;">
    <button id="exportBtn">📥 CSV</button>
    <button id="exportJsonBtn">📥 JSON</button>
    <button id="exportHtmlBtn">📥 HTML</button>
  </div>
  <script src="scanner-utils.js"></script>
  <script src="detection.js"></script>
  <script src="popup.js"></script>
</body>
</html>
